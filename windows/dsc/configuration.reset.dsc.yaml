properties:
  configurationVersion: 0.2.0

  assertions:
    - resource: Microsoft.Windows.Developer/OsVersion
      directives:
        description: Verify this configuration runs on Windows 10/11.
        allowPrerelease: true
      settings:
        MinVersion: "10.0.19041"

  resources:
    - resource: PSDscResources/Environment
      id: Dotfiles_Config_Path
      directives:
        description: Set DOTFILES_CONFIG_PATH to the repo config directory.
        allowPrerelease: false
      settings:
        name: DOTFILES_CONFIG_PATH
        value: '${WinGetConfigRoot}/../../config'

    - resource: PSDscResources/Script
      id: resetDotfiles
      dependsOn:
        - Dotfiles_Config_Path
      directives:
        description: Remove managed links and restore previous backups when available.
        securityContext: elevated
        allowPrerelease: true
      settings:
        GetScript: |
          @{
            Result = "Dotfile reset is always applied."
          }
        TestScript: |
          return $false
        SetScript: |
          & (Join-Path "${WinGetConfigRoot}" "scripts\reset-dotfiles.set.ps1")
