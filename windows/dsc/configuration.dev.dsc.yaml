    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: Visual_Studio_Code
      directives:
        description: Install Visual Studio Code
        allowPrerelease: true
      settings:
        id: Microsoft.VisualStudioCode
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: Visual_Studio_2022
      directives:
        description: Install Visual Studio
        allowPrerelease: true
      settings:
        id: Microsoft.VisualStudio.2022.Community
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: Node.js
      directives:
        description: Install Node.js
        allowPrerelease: true
      settings:
        id: OpenJS.NodeJS
        # source: winget
#
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: LinqPad_9
      directives:
        description: Install LinqPad 9
        allowPrerelease: true
      settings:
        id: LINQPad.LINQPad.9
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: ILSpy
      directives:
        description: Install ILSpy
        allowPrerelease: true
      settings:
        id: icsharpcode.ILSpy
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: windowsTerminal
      directives:
        description: Ensure Windows Terminal is installed.
        allowPrerelease: true
      settings:
        id: Microsoft.WindowsTerminal
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: wezterm
      directives:
        description: Ensure WezTerm is installed.
        allowPrerelease: true
      settings:
        id: wez.wezterm
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: glazewm
      directives:
        description: Ensure GlazeWM is installed.
        allowPrerelease: true
      settings:
        id: glzr-io.glazewm
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: yazi
      directives:
        description: Ensure Yazi is installed.
        allowPrerelease: true
      settings:
        id: sxyazi.yazi
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: zebar
      directives:
        description: Ensure Zebar is installed.
        allowPrerelease: true
      settings:
        id: glzr-io.zebar
        source: winget

    - resource: PSDscResources/Environment
      id: Dotfiles_Config_Path
      directives:
        description: Set DOTFILES_CONFIG_PATH to the repo config directory.
        allowPrerelease: false
      settings:
        name: DOTFILES_CONFIG_PATH
        value: '${WinGetConfigRoot}/../../config'

    - resource: PSDscResources/Script
      id: linkDotfiles
      dependsOn:
        - Dotfiles_Config_Path
      directives:
        description: Ensure dotfiles are linked to the expected Windows locations.
        securityContext: elevated
        allowPrerelease: true
      settings:
        GetScript: |
          @{
            Result = "Dotfile sync is always applied."
          }
        TestScript: |
          return $false
        SetScript: |
          & (Join-Path "${WinGetConfigRoot}" "scripts\link-dotfiles.set.ps1")

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: PowerToys
      directives:
        description: Install PowerToys
        allowPrerelease: true
      settings:
        id: Microsoft.PowerToys
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: bat
      directives:
        description: Install bat
        allowPrerelease: true
      settings:
        id: sharkdp.bat
        source: winget

    - resource: PSDscResources/Script
      id: Install_Z_Module_PowerShell_Gallery
      directives:
        description: Install Z module from PowerShell Gallery
      settings:
        GetScript: |
          $moduleInstalled = $null -ne (Get-Module -ListAvailable -Name Z -ErrorAction SilentlyContinue | Select-Object -First 1)
          @{
            Result = $moduleInstalled
          }
        TestScript: |
          $moduleInstalled = $null -ne (Get-Module -ListAvailable -Name Z -ErrorAction SilentlyContinue | Select-Object -First 1)
          return [bool]$moduleInstalled
        SetScript: |
          Install-Module -Name Z -RequiredVersion '1.1.9' -Force -Confirm:$false -AcceptLicense
