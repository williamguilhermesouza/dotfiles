properties:
  configurationVersion: 0.2.0

  assertions:
    - resource: Microsoft.Windows.Developer/OsVersion
      directives:
        description: Verify this configuration runs on Windows 10/11.
        allowPrerelease: true
      settings:
        MinVersion: "10.0.19041"

  resources:
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: Git
      directives:
        description: Install Git
        allowPrerelease: true 
      settings:
        id: Git.git
        source: winget

    - resource: GitDsc/GitConfigUserName
      directives:
       description: Configure Git
       allowPrerelease: true
      dependsOn:
       - Git
      settings:
        UserName: "William Souza"
        ConfigLocation: "Global"

    - resource: GitDsc/GitConfigUserEmail
      directives:
       description: Configure Git
       allowPrerelease: true
      dependsOn:
       - Git
      settings:
        UserEmail: "williamguilhermesouza@gmail.com"
        ConfigLocation: "Global"

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: Neovim
      directives:
        description: Install Neovim
        allowPrerelease: true
      settings:
        id: Neovim.Neovim
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: PowerShell_Core
      directives:
        description: Install PowerShell 7
        allowPrerelease: true
      settings:
        id: Microsoft.Powershell
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: FD
      directives:
        description: Install fd
        allowPrerelease: true
      settings:
        id: sharkdp.fd
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: FZF
      directives:
        description: Install fzf
        allowPrerelease: true
      settings:
        id: junegunn.fzf
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: Ripgrep
      directives:
        description: Install Ripgrep
        allowPrerelease: true
      settings:
        id: BurntSushi.ripgrep.MSVC
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: LazyGit
      directives:
        description: Install LazyGit
        allowPrerelease: true
      settings:
        id: JesseDuffield.lazygit
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: Carapace
      directives:
        description: Install Carapace
        allowPrerelease: true
      settings:
        id: rsteube.Carapace
        source: winget

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: JQ
      directives:
        description: Install JQ
        allowPrerelease: true
